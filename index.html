<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream Scape</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background"></div>
    <div class="stars"></div>
    
    <main class="container">
        <h1 class="title">Dream Scape</h1>
        <p class="subtitle">Turn your dreams into visual experiences</p>
        <textarea id="dreaminput" placeholder="write your dream here..."></textarea>
        <button id="btn" class="bbtn">Visualize Dream</button>
    
        <div id="output"></div>
    
        <a id="generatorLink" class="bbtn" style="display: none; margin-top: 20px; text-decoration: none; background: linear-gradient(45deg, #a855f7, #7c3aed);" target="_blank"> 🚀 View Your AI Dream Photo</a>
    </main>

    <div class="words"></div>

    <script src="script.js"></script>
</body>
</html>
